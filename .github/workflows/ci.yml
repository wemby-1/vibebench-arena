name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: Run VibeBench check
        run: vibebench check

      - name: Enforce VibeBench quality gate
        run: vibebench gate --write-gate-summary

      - name: Generate VibeBench HTML report
        if: always()
        run: vibebench report

      - name: Generate VibeBench PR comment
        if: always()
        run: vibebench pr-comment

      - name: Generate VibeBench explanation
        if: always()
        run: python -m vibebench explain

      - name: Bundle VibeBench artifacts
        if: always()
        run: python -m vibebench bundle

      - name: Write VibeBench GitHub summary
        if: always()
        run: vibebench gh-summary

      - name: Upload VibeBench artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vibebench-runs
          path: .vibebench/runs
          if-no-files-found: ignore
