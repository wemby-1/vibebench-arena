name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: Run VibeBench CI pipeline
        run: python -m vibebench ci --adoption-policy

      - name: Post VibeBench PR comment
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m vibebench pr-comment --post --no-fail-on-error

      - name: Generate proof packet
        run: python3 -m vibebench proof --output-dir .vibebench/proof-packet --zip

      - name: Add proof packet summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## VibeBench Proof Packet

          **Status:** Generated successfully

          **Artifact:** `vibebench-proof-packet`

          **Generated files:**
          - `proof.html`
          - `proof.json`
          - `proof.md`
          - `proof-manifest.json`
          - `proof.zip`

          **Reproduce locally:**

          ```bash
          python3 -m vibebench proof --output-dir .vibebench/proof-packet --zip
          ```

          `proof.html` is a self-contained evidence-first report for reviewing the local proof packet.

          Download `vibebench-proof-packet` from the GitHub Actions run artifacts area to inspect the packet locally.
          EOF

      - name: Upload VibeBench proof packet
        uses: actions/upload-artifact@v7
        with:
          name: vibebench-proof-packet
          path: .vibebench/proof-packet
          if-no-files-found: error

      - name: Prepare static site preview
        run: python3 -m vibebench site-preview --output-dir .vibebench/site-preview --zip

      - name: Add static site preview summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## VibeBench Static Site Preview

          **Status:** Static site readiness check passed

          **Artifact:** `vibebench-site-preview`

          **Included entry:** `index.html`

          **Product page:** `showcase.html`

          **Setup guide:** `pages.md`

          **Preview locally:**

          ```bash
          python3 -m http.server 8000 --directory docs
          ```

          **Readiness command:**

          ```bash
          python3 -m vibebench site-check
          ```
          EOF

      - name: Upload VibeBench static site preview
        uses: actions/upload-artifact@v7
        with:
          name: vibebench-site-preview
          path: .vibebench/site-preview
          if-no-files-found: error

      - name: Generate evidence room
        run: python3 -m vibebench evidence-room --output-dir .vibebench/evidence-room --zip

      - name: Add evidence room summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## VibeBench Evidence Room

          **Status:** Generated successfully

          **Artifact:** `vibebench-evidence-room`

          **Main files:**
          - `evidence-room.html`
          - `evidence-room.json`
          - `evidence-room.md`
          - `evidence-room.zip`
          - `proof-packet/`
          - `site-preview/`

          **Reproduce locally:**

          ```bash
          python3 -m vibebench evidence-room --output-dir .vibebench/evidence-room --zip
          ```

          **Verify locally:**

          ```bash
          python3 -m vibebench evidence-room --verify .vibebench/evidence-room
          ```

          Download `vibebench-evidence-room` from the GitHub Actions run artifacts area. This is a CI artifact, not an automatically published GitHub Pages deployment.
          EOF

      - name: Upload VibeBench evidence room
        uses: actions/upload-artifact@v7
        with:
          name: vibebench-evidence-room
          path: .vibebench/evidence-room
          if-no-files-found: error

      - name: Upload VibeBench artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vibebench-run-artifacts
          path: |
            .vibebench/runs/**/metrics.json
            .vibebench/runs/**/check.log
            .vibebench/runs/**/manifest.json
            .vibebench/runs/**/vibebench-bundle.zip
            .vibebench/runs/**/github-step-summary.md
            .vibebench/runs/**/release-check.json
            .vibebench/runs/**/release-check.md
            .vibebench/runs/**/config-check.json
            .vibebench/runs/**/config-check.md
            .vibebench/runs/**/package-check.json
            .vibebench/runs/**/package-check.md
            .vibebench/runs/**/trend.json
            .vibebench/runs/**/trend.md
            .vibebench/runs/**/run-index.json
            .vibebench/runs/**/run-index.md
            .vibebench/runs/**/compare.json
            .vibebench/runs/**/compare.md
            .vibebench/runs/**/report/**
          if-no-files-found: ignore
