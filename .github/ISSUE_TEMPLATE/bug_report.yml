name: Bug report
description: Report a reproducible problem in VibeBench Arena
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Share enough evidence to reproduce it, and remove credentials, private repo details, proprietary code, and confidential logs before posting.
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Paste the exact command that triggered the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect VibeBench to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Where did this happen?
      options:
        - Local CLI
        - GitHub Actions
        - Release audit
        - Package check
        - Artifact generation
        - Unsure or other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS / environment
      placeholder: Ubuntu 24.04, macOS 15, Windows 11, or GitHub Actions runner
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: VibeBench version or commit
      placeholder: v0.3.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output or logs
      description: Paste the smallest useful output with credentials and private paths removed.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private repo details, proprietary code, and confidential logs.
          required: true
