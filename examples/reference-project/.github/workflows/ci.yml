name: VibeBench Reference CI

on:
  pull_request:
  push:

jobs:
  vibebench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install -e .
      - run: python3 -m vibebench ci --adoption-policy --require-adoption-workflow --json
