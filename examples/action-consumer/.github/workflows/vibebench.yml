name: VibeBench Consumer Example

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  vibebench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run VibeBench through local action checkout
        uses: ./
        with:
          preset: strict
          working-directory: examples/action-consumer
          required-mode: adoption-policy
          upload-artifacts: false
