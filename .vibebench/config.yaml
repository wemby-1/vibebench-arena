project:
  name: vibebench-project
checks:
  test:
  - pytest -q
  lint:
  - ruff check .
risk_rules:
  forbidden_paths:
  - .env
  - .env.*
  - secrets/
  warn_if_tests_deleted: true
  warn_if_lockfiles_changed: true
  large_patch_lines: 500
gate:
  min_score: 80
  max_risk: medium
  allow_findings: 0
  require_status_passed: true
