<svg width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">VibeBench local quality flow</title>
  <desc id="desc">AI coding changes move through local checks, score and risk review, artifacts, GitHub review evidence, and release audit.</desc>
  <rect width="1200" height="360" fill="#f8fafc"/>
  <rect x="28" y="28" width="1144" height="304" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">VibeBench Arena: from AI coding change to reviewable evidence</text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Local-first checks produce score, risk, diff findings, artifacts, GitHub review evidence, and release audit records.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="142" width="150" height="94" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="135" y="176" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">AI coding</text>
    <text x="135" y="201" text-anchor="middle" font-size="15" fill="#334155">change</text>

    <line x1="218" y1="189" x2="265" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="274" y="142" width="150" height="94" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="349" y="172" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">VibeBench</text>
    <text x="349" y="197" text-anchor="middle" font-size="15" fill="#334155">local checks</text>

    <line x1="432" y1="189" x2="479" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="488" y="132" width="154" height="114" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="565" y="162" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Score / risk</text>
    <text x="565" y="188" text-anchor="middle" font-size="15" fill="#334155">diff review</text>
    <text x="565" y="212" text-anchor="middle" font-size="15" fill="#334155">findings</text>

    <line x1="650" y1="189" x2="697" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="706" y="142" width="150" height="94" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="781" y="176" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Artifacts</text>
    <text x="781" y="201" text-anchor="middle" font-size="15" fill="#334155">MD + JSON</text>

    <line x1="864" y1="189" x2="911" y2="189" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="920" y="132" width="154" height="114" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="997" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">GitHub</text>
    <text x="997" y="187" text-anchor="middle" font-size="15" fill="#334155">summary + PR</text>
    <text x="997" y="211" text-anchor="middle" font-size="15" fill="#334155">review evidence</text>

    <path d="M997 252 C997 292, 818 292, 781 252" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="889" y="302" text-anchor="middle" font-size="15" fill="#334155">release audit</text>
  </g>
</svg>
